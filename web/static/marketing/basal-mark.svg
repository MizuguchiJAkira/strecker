<?xml version="1.0" encoding="UTF-8"?>
<!--
  basal / mark.

  One solid disc (the basal-area cross-section / lens body) with one
  circular aperture carved out as negative space — the observer, the
  camera, the pin in the landscape. Single-path + fill-rule="evenodd"
  so no <mask>/<defs>/duplicate-id risk when inlined repeatedly.
  fill=currentColor adapts to the parent text color.

  Proportions tuned for favicon → hero scaling. Hole is 12% of the
  disc area at r=8 in a 64vb — stays visible at 16px favicon size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"
     fill="currentColor" fill-rule="evenodd" aria-label="basal">
  <path d="M 32 4 a 28 28 0 1 0 0 56 a 28 28 0 1 0 0 -56 z
           M 44 14 a 8 8 0 1 0 0 16 a 8 8 0 1 0 0 -16 z"/>
</svg>
